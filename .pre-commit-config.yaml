# Pre-commit hooks for the han plugin suite, run with prek.
#
# Run every hook manually with `npm run lint` (prek run --all-files).

# Files no hook ever touches: static archives and vendored assets.
exclude: "^(docs/plans/|docs/research/|han-reporting/skills/html-summary/assets/)"

repos:
  # Prettier owns formatting for Markdown, JSON, YAML, and JS at 120 columns.
  # Markdown runs with proseWrap: preserve and embeddedLanguageFormatting off (see
  # .prettierrc.json). Agents read skills and reference files as raw source, so the
  # source is kept robust to the two normalizations Prettier cannot turn off —
  # ordered-list renumbering and inline code-span trimming — and Prettier then
  # leaves what those files say unchanged. Running the local devDependency keeps
  # Prettier's version in package.json only, not duplicated in a hook mirror.
  # It runs first so the hygiene fixers below never fight it.
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npx prettier --write --ignore-unknown
        language: system
        types_or: [markdown, json, yaml, javascript]

  # Lint shell scripts. prek builds the environment; no Docker, no global install.
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  # Hygiene checks. The whitespace/EOL fixers exclude JSON, YAML, and JS because
  # Prettier owns those, and they exclude Markdown for its own reason: a trailing
  # double-space is a meaningful hard line break, so a whitespace fixer would
  # change how the file reads. That leaves these covering the rest (shell scripts,
  # dotfiles, LICENSE) with no overlap. check-yaml and check-json are intentionally
  # omitted: Prettier parses and so validates those types already.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.(md|markdown|json|ya?ml|jsx?|mjs|cjs)$'
      - id: end-of-file-fixer
        exclude: '\.(md|markdown|json|ya?ml|jsx?|mjs|cjs)$'
      - id: fix-byte-order-marker
        exclude: '\.(md|markdown|json|ya?ml|jsx?|mjs|cjs)$'
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: '\.(md|markdown|json|ya?ml|jsx?|mjs|cjs)$'
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-executables-have-shebangs
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: check-vcs-permalinks
